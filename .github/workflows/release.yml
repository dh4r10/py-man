name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cp target/release/pvm pvm-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-linux-x86_64
          path: pvm-linux-x86_64

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu
      - run: cp target/aarch64-unknown-linux-gnu/release/pvm pvm-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-linux-aarch64
          path: pvm-linux-aarch64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          cp target/release/pvm.exe pvm-windows-x86_64.exe
          cp target/release/pvm.exe pvm.exe
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-windows-x86_64
          path: |
            pvm-windows-x86_64.exe
            pvm.exe

  release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pvm-linux-x86_64
            pvm-linux-aarch64
            pvm-windows-x86_64.exe
            pvm.exe

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Read version from Cargo.toml
        id: version
        run: echo "value=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT
      - run: cargo build --release
      - run: cp target/release/pvm pvm-linux-x86_64-v${{ steps.version.outputs.value }}
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-linux-x86_64
          path: pvm-linux-x86_64-v*

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Read version from Cargo.toml
        id: version
        run: echo "value=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT
      - run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu
      - run: cp target/aarch64-unknown-linux-gnu/release/pvm pvm-linux-aarch64-v${{ steps.version.outputs.value }}
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-linux-aarch64
          path: pvm-linux-aarch64-v*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Read version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $v = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          echo "value=$v" >> $env:GITHUB_OUTPUT
      - run: cargo build --release
      - name: Build installer with Inno Setup
        shell: pwsh
        run: iscc /DAppVersion=${{ steps.version.outputs.value }} installer\pvm.iss
      - name: Sync npm/package.json version
        shell: pwsh
        run: npm --prefix npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version
      - name: Copy artifacts
        shell: pwsh
        run: |
          cp "dist/pvm-windows-x86_64-v${{ steps.version.outputs.value }}.exe" "pvm-windows-x86_64-v${{ steps.version.outputs.value }}.exe"
          cp target/release/pvm.exe pvm.exe
      - uses: actions/upload-artifact@v4
        with:
          name: pvm-windows-x86_64
          path: |
            pvm-windows-x86_64-v*.exe
            pvm.exe
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: npm/

  release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pvm-linux-x86_64-v*
            pvm-linux-aarch64-v*
            pvm-windows-x86_64-v*.exe
            pvm.exe

  npm-publish:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm/
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
